<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScanSnap iX1600 サポートシミュレーター — クリプラ</title>
<style>
:root {
  --bg:#f0f2f5; --panel:#fff; --border:#d1d5db;
  --accent:#1d4ed8; --accent-l:#dbeafe;
  --success:#16a34a; --success-l:#dcfce7;
  --warn:#d97706; --warn-l:#fef3c7;
  --danger:#dc2626; --danger-l:#fee2e2;
  --text:#111827; --text-s:#6b7280;
  --clipla:#003087;
  --touch-sc:#0d1b2a; --touch-ac:#4fc3f7;
  /* 対象デバイスカラー */
  --dev-body:#1e3a5f;   /* 本体バナー：濃紺 */
  --dev-pc:#4a1d96;     /* PCバナー：紫 */
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}

/* ヘッダー */
.hdr{background:var(--clipla);color:#fff;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,0.3);}
.hdr-t{font-size:15px;font-weight:700;}
.hdr-s{font-size:11px;opacity:.75;margin-top:2px;}
.badge{background:#e55;color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;}

/* レイアウト */
.wrap{display:grid;grid-template-columns:270px 1fr 280px;gap:13px;padding:13px;max-width:1440px;margin:0 auto;}
.card{background:var(--panel);border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08);overflow:hidden;}
.card+.card{margin-top:11px;}
.ch{padding:8px 13px;font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;}
.ch.blue{background:var(--clipla);}
.ch.gray{background:#4a4a4a;}
.ch.green{background:#166534;}

/* ===== 対象デバイスバナー ===== */
/* 中央エリアの上部に常時表示するバナー */
.dev-banner{
  display:flex; align-items:center; gap:0;
  border-radius:8px; overflow:hidden;
  border:2px solid transparent;
  margin-bottom:14px;
  width:100%;
}
.dev-banner-half{
  flex:1; padding:9px 14px;
  display:flex; align-items:center; gap:8px;
  font-size:12px; font-weight:700; color:#fff;
  opacity:.35; transition:all .2s;
  position:relative;
}
.dev-banner-half.active{opacity:1;}
.dev-banner-half.body-side{background:var(--dev-body);}
.dev-banner-half.pc-side{background:var(--dev-pc);}
.dev-banner-half .dev-ico{font-size:18px;}
.dev-banner-half .dev-label{line-height:1.3;}
.dev-banner-half .dev-label small{font-size:10px;font-weight:400;opacity:.85;display:block;}
.dev-banner-half.active::after{
  content:'← 今ここを見てください';
  position:absolute; bottom:-18px; left:50%;transform:translateX(-50%);
  font-size:10px; color:#fff; background:rgba(0,0,0,0.55);
  padding:2px 9px; border-radius:0 0 5px 5px; white-space:nowrap;
  font-weight:700;
}
.dev-banner-divider{width:3px;background:#fff;opacity:.25;}

/* フロー選択 */
.flow-list{padding:10px;}
.flow-btn{width:100%;text-align:left;padding:9px 11px;margin-bottom:7px;border:2px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;transition:all .13s;display:block;}
.flow-btn:hover{border-color:var(--accent);background:#eff6ff;}
.flow-btn.active{border-color:var(--accent);background:var(--accent-l);}
.flow-btn .ft{font-weight:700;font-size:12px;}
.flow-btn .fd{font-size:11px;color:var(--text-s);margin-top:2px;}

/* ステップ */
.step-wrap{padding:10px;}
.step-row{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid #f3f4f6;}
.step-row:last-child{border-bottom:none;}
.snum{min-width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.snum.done{background:var(--success);color:#fff;}
.snum.cur{background:var(--accent);color:#fff;}
.snum.todo{background:#e5e7eb;color:var(--text-s);}
.stxt{font-size:11px;line-height:1.5;}
.stxt b{color:var(--accent);}
/* ステップ横のデバイスアイコン */
.step-dev{font-size:9px;padding:1px 6px;border-radius:8px;margin-left:4px;font-weight:700;vertical-align:middle;}
.step-dev.body{background:#dbeafe;color:var(--dev-body);}
.step-dev.pc{background:#ede9fe;color:var(--dev-pc);}

/* 中央デバイスエリア */
.dev-area{padding:14px;display:flex;flex-direction:column;align-items:center;gap:12px;min-height:480px;}
/* バナー込みの上部ラッパー */
.dev-area-inner{width:100%;display:flex;flex-direction:column;align-items:center;gap:12px;}

/* 2カラム（本体 + PC）並列表示 */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;}
.col-panel{border-radius:8px;overflow:hidden;border:2px solid transparent;}
.col-panel.body-panel{border-color:var(--dev-body);}
.col-panel.pc-panel{border-color:var(--dev-pc);}
.col-header{padding:7px 11px;font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;}
.col-header.body-h{background:var(--dev-body);}
.col-header.pc-h{background:var(--dev-pc);}
.col-body{padding:10px;background:#fff;}

/* ScanSnap 本体 */
.ss-body{width:100%;max-width:210px;margin:0 auto;background:linear-gradient(160deg,#2a2a2a,#181818);border-radius:12px;padding:11px;box-shadow:0 6px 18px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.07);}
.ss-lbl{color:rgba(255,255,255,.3);font-size:8px;letter-spacing:2px;text-align:center;margin-bottom:6px;text-transform:uppercase;}
.touch{background:var(--touch-sc);border-radius:7px;border:2px solid #2a2a2a;overflow:hidden;}
.touch-bar{background:rgba(0,0,0,.35);padding:3px 7px;display:flex;justify-content:space-between;}
.touch-bar span{font-size:9px;color:rgba(255,255,255,.55);}
.touch-body{padding:8px 6px;}
.t-title{color:var(--touch-ac);font-size:10px;font-weight:700;text-align:center;margin-bottom:8px;letter-spacing:.04em;}
.tmenu{display:flex;align-items:center;justify-content:space-between;padding:5px 6px;border-radius:4px;margin-bottom:3px;cursor:pointer;transition:background .1s;}
.tmenu:hover,.tmenu.hl{background:rgba(79,195,247,.18);}
.tl{color:rgba(255,255,255,.88);font-size:10px;}
.tv{color:var(--touch-ac);font-size:9px;}
.ta{color:rgba(255,255,255,.3);font-size:9px;}
.tinfo{padding:4px 6px;margin-bottom:4px;}
.tinfo-lbl{color:rgba(255,255,255,.45);font-size:8px;margin-bottom:2px;}
.tinfo-val{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:3px;padding:3px 6px;color:#fff;font-size:9px;}
.tinfo-val.ok{border-color:rgba(79,195,247,.5);color:var(--touch-ac);}
.tinfo-val.ng{border-color:rgba(239,68,68,.5);color:#f87171;}
.tbtnrow{display:flex;gap:4px;margin-top:6px;padding:0 2px;}
.tbtn{flex:1;padding:5px 2px;border-radius:4px;border:none;cursor:pointer;font-size:9px;font-weight:700;transition:opacity .1s;}
.tbtn:hover{opacity:.82;}
.tbtn.p{background:var(--touch-ac);color:#003;}
.tbtn.s{background:rgba(255,255,255,.13);color:rgba(255,255,255,.8);}
.tbtn.d{background:#dc2626;color:#fff;}
.tmsg{text-align:center;padding:8px 5px;color:rgba(255,255,255,.65);font-size:9px;line-height:1.55;}
.tmsg.ok{color:#4ade80;}
.tmsg.ng{color:#f87171;}
.spin{width:24px;height:24px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--touch-ac);border-radius:50%;animation:sp .8s linear infinite;margin:8px auto 5px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* PC ウィンドウ */
.pc-win{border:1px solid #ccc;border-radius:7px;box-shadow:0 2px 8px rgba(0,0,0,.1);overflow:hidden;}
.pc-bar{background:linear-gradient(180deg,#f5f5f5,#e8e8e8);border-bottom:1px solid #ccc;padding:5px 9px;display:flex;align-items:center;gap:4px;font-size:11px;color:#333;}
.wbtn{width:10px;height:10px;border-radius:50%;display:inline-block;}
.wbtn.cl{background:#ff5f57;}.wbtn.mn{background:#febc2e;}.wbtn.mx{background:#28c840;}
.pc-body{padding:11px;background:#fff;}
.pc-sec{font-size:11px;font-weight:700;color:#222;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #eee;}
.tab-bar{display:flex;border-bottom:2px solid #e5e7eb;margin-bottom:9px;}
.tab{padding:5px 11px;font-size:11px;cursor:pointer;color:var(--text-s);border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--accent);font-weight:700;border-bottom-color:var(--accent);}
.scanner-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border:2px solid #e5e7eb;border-radius:5px;margin-bottom:6px;}
.scanner-row.sel{border-color:var(--accent);background:#eff6ff;}
.sc-ico{font-size:20px;}
.sc-name{font-size:11px;font-weight:700;}
.sc-st{font-size:10px;color:var(--text-s);}
.sc-st.online{color:var(--success);}
.sc-st.offline{color:var(--danger);}
.pctag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;margin-left:3px;}
.pctag.wifi{background:#d1fae5;color:#065f46;}
.pctag.ng{background:#fee2e2;color:#991b1b;}

/* 情報ボックス */
.ibox{border-radius:6px;padding:7px 10px;font-size:11px;line-height:1.55;margin-top:7px;}
.ibox.blue{background:#eff6ff;border:1px solid #93c5fd;color:#1e40af;}
.ibox.green{background:var(--success-l);border:1px solid #86efac;color:#14532d;}
.ibox.warn{background:var(--warn-l);border:1px solid #fcd34d;color:#78350f;}
.ibox.red{background:var(--danger-l);border:1px solid #fca5a5;color:#7f1d1d;}
.ibox.gray{background:#f9fafb;border:1px solid #d1d5db;color:#374151;}
.mark{background:#fef08a;padding:0 3px;border-radius:2px;font-weight:700;}

/* チェック確認 */
.chk-item{display:flex;align-items:flex-start;gap:7px;padding:6px 8px;border:1px solid #e5e7eb;border-radius:5px;margin-bottom:4px;background:#fafafa;cursor:pointer;transition:all .12s;}
.chk-item:hover{background:#f0f9ff;}
.chk-item.checked{background:var(--success-l);border-color:#86efac;}
.chk-box{width:17px;height:17px;border:2px solid #ccc;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;}
.chk-item.checked .chk-box{background:var(--success);border-color:var(--success);color:#fff;}
.chk-txt{font-size:11px;line-height:1.5;}

/* 結果ボタン */
.res-btns{display:flex;gap:7px;margin-top:9px;}
.res-btn{flex:1;padding:8px 5px;border-radius:6px;border:2px solid;cursor:pointer;font-size:11px;font-weight:700;text-align:center;transition:all .12s;}
.res-btn.yes{border-color:var(--success);color:var(--success);background:#fff;}
.res-btn.yes:hover{background:var(--success-l);}
.res-btn.no{border-color:var(--danger);color:var(--danger);background:#fff;}
.res-btn.no:hover{background:var(--danger-l);}

/* ウィザード */
.wiz-bar{display:flex;margin-bottom:11px;}
.wiz-s{flex:1;padding:4px 2px;text-align:center;font-size:9px;background:#e2e8f0;color:#64748b;border-right:1px solid #cbd5e1;}
.wiz-s:last-child{border-right:none;}
.wiz-s.done{background:#bbf7d0;color:#166534;}
.wiz-s.cur{background:var(--accent);color:#fff;font-weight:700;}

.form-row{margin-bottom:9px;}
.form-lbl{font-size:10px;font-weight:700;color:#555;margin-bottom:3px;}
.form-in{width:100%;padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:11px;font-family:inherit;}
.form-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(29,78,216,.15);}
.ssid-opt{display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px solid #ddd;border-radius:4px;margin-bottom:4px;cursor:pointer;background:#fff;transition:all .12s;}
.ssid-opt:hover,.ssid-opt.sel{border-color:var(--accent);background:#eff6ff;}

.pcbtn{padding:5px 13px;border-radius:5px;border:1px solid;cursor:pointer;font-size:11px;font-weight:700;transition:all .12s;}
.pcbtn.p{background:var(--accent);color:#fff;border-color:#1e3a8a;}
.pcbtn.p:hover{background:#1e3a8a;}
.pcbtn.s{background:#fff;color:#333;border-color:#ccc;}
.pcbtn.s:hover{background:#f5f5f5;}

/* TS */
.ts-node{border:1px solid #ddd;border-radius:7px;overflow:hidden;margin-bottom:7px;}
.ts-q{padding:8px 11px;background:#f8fafc;font-size:11px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.ts-q:hover{background:#eff6ff;}
.ts-a{padding:9px 11px;border-top:1px solid #e5e7eb;font-size:11px;line-height:1.65;display:none;}
.ts-a.show{display:block;}
.ts-a ul{margin-left:15px;margin-top:3px;}
.ts-a li{margin-bottom:4px;}

/* ログ */
.log-area{padding:8px;height:calc(100vh - 125px);overflow-y:auto;}
.log-item{font-size:11px;padding:5px 7px;border-radius:5px;margin-bottom:4px;border-left:3px solid;line-height:1.5;}
.log-item.info{background:#eff6ff;border-color:var(--accent);}
.log-item.ok{background:var(--success-l);border-color:var(--success);}
.log-item.warn{background:var(--warn-l);border-color:var(--warn);}
.log-item.err{background:var(--danger-l);border-color:var(--danger);}
.log-t{color:var(--text-s);font-size:9px;margin-bottom:1px;}
.bubble{border-radius:7px;padding:7px 9px;margin-bottom:6px;font-size:11px;line-height:1.5;}
.bubble::before{font-size:9px;font-weight:700;display:block;margin-bottom:2px;color:#555;}
.bubble.cust{background:#e0f2fe;}.bubble.cust::before{content:"🏥 お客様";}
.bubble.sup{background:#dcfce7;}.bubble.sup::before{content:"📞 サポート担当";}

/* 接続バッジ */
.conn-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.conn-badge.on{background:var(--success-l);color:var(--success);}
.conn-badge.off{background:var(--danger-l);color:var(--danger);}
.conn-dot{width:7px;height:7px;border-radius:50%;}
.conn-dot.on{background:var(--success);}
.conn-dot.off{background:var(--danger);}

.reset-btn{width:100%;margin-top:7px;padding:6px;border-radius:5px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:11px;color:var(--text-s);transition:all .12s;}
.reset-btn:hover{border-color:var(--danger);color:var(--danger);background:#fef2f2;}

@keyframes fi{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fi .2s ease;}

/* 案内エリア（スクリプト+補足を横並び） */
.guide-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin-top:4px;}
.section-tag{font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:8px;background:#e0f2fe;color:#0369a1;display:inline-block;margin-bottom:5px;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-t">📠 ScanSnap iX1600 サポートシミュレーター</div>
    <div class="hdr-s">クリプラ設定確認用 — 電話対応中に使用 ｜ SSID: <b>clipla</b>（ステルス） PW: <b>clip2020</b></div>
  </div>
  <span class="badge">社内専用</span>
</div>

<div class="wrap">

<!-- 左：フロー & ステップ -->
<div>
  <div class="card">
    <div class="ch blue">🎯 対応フロー</div>
    <div class="flow-list">
      <button class="flow-btn" id="fb-check" onclick="setFlow('check')">
        <div class="ft">① 接続状態の確認（まず最初に）</div>
        <div class="fd">本体とPCソフト、両方の状態を確認する</div>
      </button>
      <button class="flow-btn" id="fb-reconnect" onclick="setFlow('reconnect')">
        <div class="ft">② Wi-Fi再設定（cliplaへ再接続）</div>
        <div class="fd">本体タッチパネルから clipla に再設定</div>
      </button>
      <button class="flow-btn" id="fb-ts" onclick="setFlow('ts')">
        <div class="ft">③ つながらない場合のTS</div>
        <div class="fd">症状別トラブルシューティング</div>
      </button>
    </div>
  </div>
  <div class="card">
    <div class="ch gray">📋 対応ステップ</div>
    <div class="step-wrap" id="stepWrap">
      <div style="color:#aaa;font-size:11px;padding:8px;">フローを選択してください</div>
    </div>
  </div>
</div>

<!-- 中央：シミュレーター -->
<div class="card">
  <div class="ch blue">🖥️ 画面シミュレーター</div>
  <div class="dev-area" id="devArea">
    <div style="color:#bbb;font-size:12px;margin-top:60px;text-align:center;">
      ← 左のフローを選択してください
    </div>
  </div>
</div>

<!-- 右：ログ -->
<div class="card">
  <div class="ch green">📝 対応ログ</div>
  <div class="log-area" id="logArea">
    <div class="bubble cust">ScanSnapのWi-Fiが繋がらなくなりました</div>
    <div class="bubble sup">状況を確認させてください。本体の画面とPCのソフト、両方を一緒に確認しましょう</div>
  </div>
</div>
</div><!-- /wrap -->

<script>
const S = {
  flow:null, step:0,
  touchConn:null, pcConn:null,
  chkMap:{}, wiz:0, selSSID:null,
};
const CLIPLA_SSID='clipla', CLIPLA_PASS='clip2020';

// ===== フロー定義（ステップにdevice種別を付与）=====
const FLOWS = {
  check:{
    label:'① 接続状態の確認',
    steps:[
      {t:'本体の電源・ランプを確認',         dev:'body'},
      {t:'本体タッチパネルの表示を確認',      dev:'body'},
      {t:'PC側 ScanSnap Home を開く',        dev:'pc'},
      {t:'スキャナータブで接続状態を確認',    dev:'pc'},
      {t:'確認結果まとめ',                   dev:null},
    ]
  },
  reconnect:{
    label:'② Wi-Fi再設定',
    steps:[
      {t:'本体 設定 → Wi-Fi設定 を開く',     dev:'body'},
      {t:'ネットワーク（SSID）設定を選択',   dev:'body'},
      {t:'SSIDを手動入力：clipla',           dev:'body'},
      {t:'パスワード入力：clip2020',          dev:'body'},
      {t:'接続完了確認',                     dev:'body'},
      {t:'PC側 ScanSnap Home で再確認',      dev:'pc'},
    ]
  },
  ts:{
    label:'③ トラブルシューティング',
    steps:[
      {t:'症状を選んで確認',dev:null},
    ]
  }
};

// ===== ユーティリティ =====
function ts(){const n=new Date();return`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;}
function pad(n){return String(n).padStart(2,'0');}
function addLog(type,msg,script){
  const a=document.getElementById('logArea');
  const d=document.createElement('div');
  d.className=`log-item ${type} fi`;
  d.innerHTML=`<div class="log-t">${ts()}</div>${msg}`;
  a.appendChild(d);
  if(script){const b=document.createElement('div');b.className='bubble sup fi';b.textContent=script;a.appendChild(b);}
  a.scrollTop=a.scrollHeight;
}

// ===== デバイスバナーを描画 =====
// target: 'body' | 'pc' | 'both' | null
function renderBanner(target){
  const bodyActive = target==='body'||target==='both';
  const pcActive   = target==='pc'||target==='both';
  return `
    <div class="dev-banner fi" style="margin-bottom:${target?'22px':'6px'}">
      <div class="dev-banner-half body-side ${bodyActive?'active':''}">
        <div class="dev-ico">📠</div>
        <div class="dev-label">ScanSnap 本体<small>タッチパネルを見る</small></div>
      </div>
      <div class="dev-banner-divider"></div>
      <div class="dev-banner-half pc-side ${pcActive?'active':''}">
        <div class="dev-ico">💻</div>
        <div class="dev-label">PC の ScanSnap Home<small>ソフトウェアを見る</small></div>
      </div>
    </div>
  `;
}

// ===== フロー設定 =====
function setFlow(id){
  S.flow=id; S.step=0; S.wiz=0; S.touchConn=null; S.pcConn=null; S.chkMap={};
  document.querySelectorAll('.flow-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('fb-'+id).classList.add('active');
  renderSteps(); renderDev();
  addLog('info',`フロー「${FLOWS[id].label}」を開始`);
}
function renderSteps(){
  const f=FLOWS[S.flow];
  if(!f){document.getElementById('stepWrap').innerHTML='<div style="color:#aaa;font-size:11px;padding:8px;">フローを選択してください</div>';return;}
  document.getElementById('stepWrap').innerHTML=f.steps.map((s,i)=>{
    const cls=i<S.step?'done':i===S.step?'cur':'todo';
    const ic=i<S.step?'✓':i+1;
    const devTag=s.dev?`<span class="step-dev ${s.dev}">${s.dev==='body'?'📠本体':'💻PC'}</span>`:'';
    return`<div class="step-row"><div class="snum ${cls}">${ic}</div><div class="stxt">${i===S.step?`<b>${s.t}</b>`:s.t}${devTag}</div></div>`;
  }).join('');
}
function nextStep(){S.step++;renderSteps();renderDev();}
function prevStep(){if(S.step>0){S.step--;renderSteps();renderDev();}}
function setStep(n){S.step=n;renderSteps();renderDev();}

function renderDev(){
  if(!S.flow)return;
  if(S.flow==='check')renderCheck();
  else if(S.flow==='reconnect')renderReconnect();
  else renderTS();
}

function toggleChk(id){
  S.chkMap[id]=!S.chkMap[id];
  const el=document.getElementById(id),cb=document.getElementById('cb'+id.slice(1));
  if(S.chkMap[id]){el.classList.add('checked');cb.textContent='✓';}
  else{el.classList.remove('checked');cb.textContent='';}
}

      <div style="font-size:14px;font-weight:700;color:var(--success);margin-bottom:6px;">対応完了</div>
      <div class="ibox green" style="text-align:left;">📝 対応メモ：<br>・SSID「clipla」（ステルス）へ手動入力で再接続<br>・PC側でWi-Fi接続中を確認<br>・スキャン動作確認をお客様に依頼済み</div>
      <button class="reset-btn" style="max-width:200px;margin:10px auto 0;" onclick="resetSim()">🔄 最初からやり直す</button>
    </div>
  `;
}

// ==========================================
// フロー③ TS
// ==========================================

function renderTS(){
  const area=document.getElementById('devArea');
  area.innerHTML=renderBanner(null)+`
    <div style="width:100%;" class="fi">
      <div style="font-size:13px;font-weight:700;margin-bottom:3px;">症状を選んで展開してください</div>
      <div style="font-size:11px;color:var(--text-s);margin-bottom:10px;">
        <span style="background:#dbeafe;color:var(--dev-body);padding:1px 7px;border-radius:8px;font-size:10px;font-weight:700;">📠 本体</span> を確認する項目と
        <span style="background:#ede9fe;color:var(--dev-pc);padding:1px 7px;border-radius:8px;font-size:10px;font-weight:700;">💻 PC</span> を確認する項目が混在しています
      </div>
      ${TS_ITEMS.map((item,i)=>{
        const devLabel=item.dev==='body'?'<span style="background:#dbeafe;color:var(--dev-body);padding:1px 6px;border-radius:6px;font-size:9px;font-weight:700;margin-right:5px;">📠 本体</span>'
          :item.dev==='pc'?'<span style="background:#ede9fe;color:var(--dev-pc);padding:1px 6px;border-radius:6px;font-size:9px;font-weight:700;margin-right:5px;">💻 PC</span>'
          :'';
        return`<div class="ts-node">
          <div class="ts-q" onclick="toggleTS(${i})">${devLabel}<span>${item.q}</span><span id="ts-ar-${i}" style="font-size:10px;color:#aaa;flex-shrink:0;margin-left:6px;">▼</span></div>
          <div class="ts-a" id="ts-a-${i}">${item.a}</div>
        </div>`;
      }).join('')}
      <div style="display:flex;gap:7px;margin-top:10px;">
        <button class="pcbtn p" onclick="setFlow('reconnect')">② Wi-Fi再設定へ →</button>
        <button class="pcbtn s" onclick="setFlow('check')">← ① 確認フローへ</button>
      </div>
    </div>
  `;
}
function toggleTS(i){
  const el=document.getElementById('ts-a-'+i),ar=document.getElementById('ts-ar-'+i);
  const open=el.classList.toggle('show');
  ar.textContent=open?'▲':'▼';
  if(open)addLog('info',`TS確認：${TS_ITEMS[i].q.slice(0,28)}…`);
}

// ===== リセット =====
function resetSim(){
  Object.assign(S,{flow:null,step:0,touchConn:null,pcConn:null,chkMap:{},wiz:0,selSSID:null});
  document.querySelectorAll('.flow-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('stepWrap').innerHTML='<div style="color:#aaa;font-size:11px;padding:8px;">フローを選択してください</div>';
  document.getElementById('devArea').innerHTML='<div style="color:#bbb;font-size:12px;margin-top:60px;text-align:center;">← 左のフローを選択してください</div>';
  addLog('warn','リセットしました');
}
